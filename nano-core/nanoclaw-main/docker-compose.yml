# NanoSolana Docker Compose
# Runs nano-core gateway + agent container with healthcheck
#
# Usage:
#   docker compose up -d
#   docker compose logs -f
#   docker compose down

services:
  gateway:
    build:
      context: .
      dockerfile: container/Dockerfile
    container_name: nanosolana-gateway
    ports:
      - "${NANO_GATEWAY_PORT:-18789}:18789"
      - "${NANO_BRIDGE_PORT:-18790}:18790"
    env_file: .env
    init: true
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:18789/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - nanosolana-data:/workspace
      - ./groups:/workspace/groups

volumes:
  nanosolana-data:
